[models]
generate = "gemma4:12b"
embed    = "nomic-embed-text"

[generation]
temperature = 0.4
top_p       = 0.95
top_k       = 64

[chunking]
size    = 800
overlap = 150

[whisper]
model        = "large-v3"
device       = "cuda"      # cuda | cpu
compute_type = "float16"   # float16 | int8 | int8_float16
language     = "ja"

[retrieval]
top_k = 5

[paths]
chroma_dir = "data/chroma"

[chroma]
collection = "lectures"
